title: "Foundry Project Self-Service"
description: "Prototyping self-service Foundry Project provisioning with Azure Deployment Environments and GitHub Actions"
remote_theme: just-the-docs/just-the-docs@v0.10.1
plugins:
  - jekyll-remote-theme

# just-the-docs configuration
color_scheme: light
search_enabled: true
nav_enabled: true

# Mermaid support (just-the-docs has built-in support)
mermaid:
  version: "11"

